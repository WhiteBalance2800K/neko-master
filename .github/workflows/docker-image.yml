name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: whitebalance2026/neko-master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          major_minor="$(node -p "const v=require('./package.json').version.split('.'); `${v[0]}.${v[1]}`")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: whitebalance2026
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=v${{ steps.pkg.outputs.major_minor }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=v${{ steps.pkg.outputs.version }},enable=${{ github.ref_name == 'main' }}
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect pushed image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            docker buildx imagetools inspect "$image"
          done <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS
